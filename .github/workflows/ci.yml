# ────────────────────────────────────────────────────────────────
# CI Pipeline — Reto T-Shaped Engineer
# Día 4: Linter → Tests → Build Docker
# Si falla cualquier paso, el pipeline se detiene.
# ────────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Paso 1: Linter ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint — errores de sintaxis (bloquean el build)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — warnings de estilo
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ─── Paso 2: Tests unitarios ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint  # Solo corre si el lint pasa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short

  # ─── Paso 3: Build imagen Docker ────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test  # Solo buildea si los tests pasan
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t reto-api:${{ github.sha }} .

      - name: Verify image was created
        run: docker images reto-api:${{ github.sha }}
