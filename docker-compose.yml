# ────────────────────────────────────────────────────
# Docker Compose — Día 3: Compose + Secret Management
# Los secretos se inyectan desde archivos, NO en .env
# ────────────────────────────────────────────────────
version: "3"

services:
  web:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: ./backend
    # Retiramos el puerto 8000 de exposición pública porque Nginx (web) hará el proxy inverso internamente
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://myuser:superseguro123@db:5432/mydb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_DB=mydb
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    ports:
      - "5433:5432"
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

secrets:
  db_password:
    file: ./db_password.txt

volumes:
  db_data: