server {
    listen 80;
    server_name localhost;

    # Backend Proxy — Manda todo lo que empiece con /api al contenedor FastAPI
    # El upstream 'app' hace referencia al nombre del servicio en docker-compose
    location /api/ {
        proxy_pass http://app:8000/; # La barra al final remueve /api antes de llegar al backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Autenticación Proxy — Para redirigir las rutas /auth
    location /auth/ {
        proxy_pass http://app:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend estático — Sirve Vite para el resto de rutas
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React Router fallback
        try_files $uri $uri/ /index.html;
    }
}
